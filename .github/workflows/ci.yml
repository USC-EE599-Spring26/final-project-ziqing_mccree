name: ci
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
    CI_XCODE: '/Applications/Xcode_26.1.app/Contents/Developer'

concurrency:
   group: ${{ github.workflow }}-${{ github.ref }}
   cancel-in-progress: true

jobs:
  test:
    runs-on: macos-26
    strategy:
      matrix:
        destination: ['-destination platform\=iOS\ Simulator,OS=26.1,name\=iPhone\ 17\ Pro\ Max test', 'CODE_SIGNING_ALLOWED="NO"', '-destination platform\=visionOS\ Simulator,OS=26.1,name\=Apple\ Vision\ Pro']
        scheme: ['OCKSample', 'OCKWatchSample', 'OCKVisionSample']
        exclude:
        - destination: '-destination platform\=iOS\ Simulator,OS=26.1,name\=iPhone\ 17\ Pro\ Max test'
          scheme: 'OCKWatchSample'
        - destination: '-destination platform\=visionOS\ Simulator,OS=26.1,name\=Apple\ Vision\ Pro'
          scheme: 'OCKWatchSample'
        - destination: 'CODE_SIGNING_ALLOWED="NO"'
          scheme: 'OCKSample'
        - destination: '-destination platform\=visionOS\ Simulator,OS=26.1,name\=Apple\ Vision\ Pro'
          scheme: 'OCKSample'
        - destination: '-destination platform\=iOS\ Simulator,OS=26.1,name\=iPhone\ 17\ Pro\ Max test'
          scheme: 'OCKVisionSample'
        - destination: 'CODE_SIGNING_ALLOWED="NO"'
          scheme: 'OCKVisionSample'
    name: ${{ matrix.scheme }} Unit Tests
    steps:
    - uses: actions/checkout@v6
    - name: Install SwiftLint
      run: brew install swiftlint
    - name: Initialize submodules (robust)
      run: |
        set -euo pipefail

        # Keep local submodule config in sync with .gitmodules.
        git submodule sync --recursive

        # First attempt: normal recursive checkout.
        if git submodule update --init --recursive --jobs 4; then
          echo "Submodules initialized on first attempt."
          exit 0
        fi

        echo "::warning::Initial submodule checkout failed. Running diagnostics and fallback logic."
        git submodule status --recursive || true

        rk_path="$(git config -f .gitmodules --get submodule.ResearchKit.path || true)"
        rk_url="$(git config -f .gitmodules --get submodule.ResearchKit.url || true)"
        rk_sha="$(git ls-tree HEAD "${rk_path:-ResearchKit}" 2>/dev/null | awk '{print $3}' || true)"

        # If the pinned SHA is no longer reachable on remote, fallback to a safe branch tip.
        if [ -n "${rk_url}" ] && [ -n "${rk_sha}" ]; then
          if [ -z "$(git ls-remote "${rk_url}" "${rk_sha}" || true)" ]; then
            echo "::warning::ResearchKit submodule commit ${rk_sha} is missing on remote. Falling back to a remote branch head for CI."
            git submodule deinit -f -- "${rk_path}" || true
            rm -rf "${rk_path}"
            git clone --depth 1 "${rk_url}" "${rk_path}"
            (
              cd "${rk_path}"
              # Prefer main, then stable, then master.
              if git rev-parse --verify origin/main >/dev/null 2>&1; then
                git checkout -q origin/main
              elif git rev-parse --verify origin/stable >/dev/null 2>&1; then
                git checkout -q origin/stable
              elif git rev-parse --verify origin/master >/dev/null 2>&1; then
                git checkout -q origin/master
              fi
              echo "ResearchKit fallback commit: $(git rev-parse HEAD)"
            )
          fi
        fi

        # Final attempt for all remaining submodules.
        git submodule update --init --recursive --jobs 4 || true
        git submodule status --recursive || true
    - name: Build-Test
      run: set -o pipefail && env NSUnbufferedIO=YES xcodebuild -project OCKSample.xcodeproj -scheme ${{ matrix.scheme }} ${{ matrix.destination }} -derivedDataPath DerivedData 2>&1 | xcbeautify --renderer github-actions
      env:
          DEVELOPER_DIR: ${{ env.CI_XCODE }}
    - name: Upload codecov yml
      run: |
        cat .codecov.yml | curl --data-binary @- https://codecov.io/validate
    - name: Prepare codecov
      uses: sersoft-gmbh/swift-coverage-action@v5
      id: coverage-files
      with:
        format: lcov
        search-paths: ./DerivedData
        ignore-conversion-failures: true
      env:
          DEVELOPER_DIR: ${{ env.CI_XCODE }}
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: ${{join(fromJSON(steps.coverage-files.outputs.files), ',')}}
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}
      env:
          DEVELOPER_DIR: ${{ env.CI_XCODE }}
